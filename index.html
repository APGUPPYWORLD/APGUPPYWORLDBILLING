<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AP Guppy World — Billing</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="layout">

  <!-- ======================= SIDEBAR ======================= -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <img src="assets/logo-mark.png" alt="AP GUPPY WORLD" class="brand-logo">
      <span class="brand-name">AP GUPPY WORLD</span>
    </div>

    <nav class="menu" id="menu">
      <a href="#dashboard" data-view="dashboard"><i class="bi bi-house-door"></i><span>Dashboard</span></a>
      <a href="#billing"   data-view="billing"><i class="bi bi-receipt"></i><span>Billing</span></a>
      <a href="#customers" data-view="customers"><i class="bi bi-people"></i><span>Customers</span></a>
      <a href="#reports"   data-view="reports"><i class="bi bi-bar-chart"></i><span>Reports</span></a>
      <a href="#varieties" data-view="varieties"><i class="bi bi-water"></i><span>Fish Varieties</span></a>
      <a href="#settings"  data-view="settings"><i class="bi bi-gear"></i><span>Settings</span></a>
    </nav>

    <div class="menu-foot">
      <a href="#billing" class="btn-grad btn-block"><i class="bi bi-plus-lg"></i> New Bill</a>
    </div>
  </aside>
  <div class="scrim" id="scrim"></div>

  <!-- ======================= MAIN ======================= -->
  <div class="main">
    <header class="topbar">
      <button class="hamb" id="hamb" aria-label="Menu"><i class="bi bi-list"></i></button>

      <div class="search" role="search">
        <i class="bi bi-search"></i>
        <input id="globalSearch" type="text" placeholder="Search customer, mobile or location…" autocomplete="off">
        <div class="search-pop" id="searchPop"></div>
      </div>

      <div class="topbar-right">
        <span class="datechip"><i class="bi bi-calendar3"></i> <span id="todayLabel"></span></span>
        <button class="btn-ghost" id="importHdr"><i class="bi bi-upload"></i> <span>Import</span></button>
        <a href="#billing" class="btn-grad"><i class="bi bi-plus-lg"></i> <span>New Bill</span></a>
      </div>
    </header>

    <main class="view" id="view"><!-- rendered by JS --></main>
  </div>
</div>

<!-- toast host -->
<div class="toast-host" id="toastHost"></div>

<!-- modal host -->
<div id="modalHost"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="js/config.js"></script>
<script src="js/ui.js"></script>
<script src="js/api.js"></script>
<script src="js/views.js"></script>
<script src="js/app.js"></script>
</body>
</html>
